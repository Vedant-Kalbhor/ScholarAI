services:
  - type: web
    name: researchassist-backend
    env: docker
    rootDir: backend
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    disk:
      name: researchassist-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: VECTOR_DB_PATH
        value: /app/data/chromadb
      - key: BACKEND_CORS_ORIGINS
        value: http://localhost:5173,http://localhost:5174,https://your-vercel-app.vercel.app
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: GROQ_MODEL
        value: llama-3.1-70b-versatile
      - key: OLLAMA_MODEL
        value: llama3:latest
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: ZOTERO_API_KEY
        sync: false
      - key: ZOTERO_USER_ID
        sync: false
