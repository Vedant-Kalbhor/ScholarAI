version: '3.8'

services:
  backend:
    image: vedant08k/researchassist-backend:latest
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    # If you have data to persist, you can mount a volume
    # volumes:
    #   - ./data:/app/data

  frontend:
    image: vedant08k/researchassist-frontend:latest
    build:
      context: ./frontend
      args:
        # Defaults to localhost for local testing, can be overridden for EC2
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    ports:
      - "80:80"
    depends_on:
      - backend
